<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="conteiner">
        <div class="corpo">
            <h3>Cadastro</h3>
            <form action="" id="formulario">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder=" insira seu nomeNome">
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="insira seu Email">
                <div id="erroEmail" class="erro"></div>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="insira o telefone">
                <div id="erroTel" class="erro"></div>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="insira seu CPF">
                <div id="erroCpf" class="erro"></div>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder=" insira sua Idade">
                <div id="erroIdade" class="erro"></div>

                 <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="insira sua Cidade">
                <div id="erroCidade" class="erro"></div>

                <label for="moradia">Tipo de moradia</label>
                <input type="text" id="moradia" placeholder="insira sua Moradia">
                <div id="erroMoradia" class="erro"></div>

                <button type="submit">Enviar</button>

            </form>
        </div>


        <div class="resultado" id="resultado"></div>

    </div>
    <script src="script.js"></script>
</body>

</html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="conteiner">

        <h3>Cadastro</h3>
        <form action="" id="formulario">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Senha">
            <div id="erroSenha" class="erro"></div>

            <label for="cpf">CPF:</label>
            <input type="number" id="cpf" placeholder="CPF">
            <div id="erroCpf" class="erro"></div>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Idade">
            <div id="erroIdade" class="erro"></div>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Cidade">
            <div id="erroCidade" class="erro"></div>

            <label for="moradia">Tipo de moradia/Residencia</label>
            <input type="text" id="moradia" placeholder="Moradia">
            <div id="erroMoradia" class="erro"></div>

            <button type="submit">Enviar</button>

        </form>

        <div class="resultado" id="resultado"></div>

    </div>
    <script src="script.js"></script>
</body>

</html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="conteiner">
        
        <div class="corpo">
            <h1>ONG de adoção</h1>
            <h3>Cadastro</h3>
            <form action="" id="formulario">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder=" insira seu nomeNome">
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="insira seu Email">
                <div id="erroEmail" class="erro"></div>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="insira o telefone" pattern="[0,9] {8}">
                <div id="erroTel" class="erro"></div>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" required placeholder="insira seu CPF" pattern="[0,9] {11}">
                <div id="erroCpf" class="erro"></div>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder=" insira sua Idade">
                <div id="erroIdade" class="erro"></div>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="insira sua Cidade">
                <div id="erroCidade" class="erro"></div>

                <label for="moradia">Tipo de moradia</label>
                <input type="radio"  name="tipo_moradia" id="moradia" >Casa
                 <input type="radio"  name="tipo_moradia" id="moradia_2" >Apartamento
                <div id="erroMoradia"  class="erro"></div>

                <label for="quintal">Possui Quintal ?</label>
                <input type="radio" name= "escolha_quintal" id="quintal"> sim 
                <input type="radio" name= "escolha_quintal" id="quintal_2"> não 
                        <br>

                <label for="pets">Ja teve pets?</label>
                <input type="radio" name ="pets_teve" id="pets"> sim
                <input type="radio" name ="pets_teve" id="pets_2"> não
                <br>

                <label for="horas">quantas horas o animal fica em casa sozinho?</label>
                <input type="text" id="horas"placeholder= "insira a quantidade tempo">
                <div id="erroHora" class="erro"></div>

                <label for="motivo">Motivo da doação</label>
                <textarea  id="motivo" placeholder="insira o mnotivo de sua doação"></textarea>
                <div id="erroMotivo" class="erro"></div>

                <label for="termo">Termos de condição</label>
                <input type="checkbox" id="termo"> você aceitas os termos de codição ?

                <button type="submit">Enviar</button>

            </form>
        </div>


        <div class="resultado" id="resultado"></div>

    </div>
    <script src="script.js"></script>
</body>

</html>
